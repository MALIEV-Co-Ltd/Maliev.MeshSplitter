services:
  mesh-splitter:
    image: ${MESH_SPLITTER_IMAGE:-ghcr.io/maliev-co-ltd/maliev.meshsplitter:main}
    container_name: mesh-splitter
    restart: unless-stopped
    pull_policy: always
    environment:
      NODE_ENV: production
      PORT: 3000
      FRONTEND_DIST_DIR: /app/frontend/dist
      SESSION_SECRET: ${SESSION_SECRET}
      SHOPIFY_APP_PROXY_SECRET: ${SHOPIFY_APP_PROXY_SECRET}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_WEBHOOK_SECRET}
      CREDIT_STORE: ${CREDIT_STORE:-memory}
      DATABASE_URL: ${DATABASE_URL:-}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-https://mesh-splitter.local}
    ports:
      - "${MESH_SPLITTER_HOST_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: "mesh-splitter"
    # When run with a private GHCR package, run `docker login ghcr.io`
    # with the same NAS Docker credential before starting this stack.

  mesh-splitter-watchtower:
    image: containrrr/watchtower:latest
    container_name: mesh-splitter-watchtower
    restart: unless-stopped
    command:
      - --interval
      - "60"
      - --cleanup
      - --scope
      - mesh-splitter
      - --label-enable
    environment:
      DOCKER_CONFIG: /root/.docker
      REPO_USER: ${GHCR_USERNAME}
      REPO_PASS: ${GHCR_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker:/root/.docker:ro
