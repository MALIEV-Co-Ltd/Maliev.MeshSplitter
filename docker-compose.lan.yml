services:
  mesh-splitter:
    image: ${MESH_SPLITTER_IMAGE:-ghcr.io/maliev-co-ltd/maliev.meshsplitter:main}
    container_name: mesh-splitter
    restart: unless-stopped
    pull_policy: always
    environment:
      NODE_ENV: production
      PORT: 3000
      FRONTEND_DIST_DIR: /app/frontend/dist
      SESSION_SECRET: ${SESSION_SECRET}
      SHOPIFY_APP_PROXY_SECRET: ${SHOPIFY_APP_PROXY_SECRET}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_WEBHOOK_SECRET}
      CREDIT_STORE: ${CREDIT_STORE:-memory}
      DATABASE_URL: ${DATABASE_URL:-}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-https://mesh-splitter.local}
    ports:
      - "${MESH_SPLITTER_HOST_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: "mesh-splitter"
    # For private GHCR access, provide GHCR_USERNAME/GHCR_TOKEN in the env file
    # or run `docker login ghcr.io` as the same NAS Docker user before starting.

  mesh-splitter-watchtower:
    image: containrrr/watchtower:latest
    container_name: mesh-splitter-watchtower
    restart: unless-stopped
    env_file:
      - .env.mesh-splitter.local
    command:
      - --interval
      - "60"
      - --cleanup
      - --scope
      - mesh-splitter
      - --label-enable
    environment:
      # Fallback registry auth envs (legacy Watchtower behavior).
      REPO_USER: ${REPO_USER:-${GHCR_USERNAME}}
      REPO_PASS: ${REPO_PASS:-${GHCR_TOKEN}}
      DOCKER_CONFIG: /config
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Private GHCR fallback auth via mounted Docker config file.
      - /root/.docker/config.json:/config/config.json:ro
