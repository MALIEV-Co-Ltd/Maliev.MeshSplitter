# Copy to shopify.app.toml after linking or creating the Shopify Partner app.
# Replace the placeholders, then run:
# shopify app config validate --json
# shopify app deploy

client_id = "<shopify-app-client-id>"
name = "MALIEV MeshSplitter"
application_url = "https://maliev-mesh-splitter-1036965383273.europe-west1.run.app/auth"
embedded = false

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

[[webhooks.subscriptions]]
topics = ["orders/paid"]
uri = "https://maliev-mesh-splitter-1036965383273.europe-west1.run.app/webhooks/shopify/orders-paid"

[auth]
redirect_urls = [
  "https://maliev-mesh-splitter-1036965383273.europe-west1.run.app/auth/callback",
  "https://maliev-mesh-splitter-1036965383273.europe-west1.run.app/auth/shopify/callback",
  "https://maliev-mesh-splitter-1036965383273.europe-west1.run.app/api/auth/callback"
]

[app_proxy]
url = "https://maliev-mesh-splitter-1036965383273.europe-west1.run.app/"
prefix = "tools"
subpath = "mesh-splitter"
