databases:
  - name: maliev-mesh-splitter-db
    plan: basic-256mb
    databaseName: mesh_splitter
    user: mesh_splitter

services:
  - type: web
    name: maliev-mesh-splitter
    runtime: docker
    plan: starter
    repo: https://github.com/MALIEV-Co-Ltd/Maliev.MeshSplitter
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_MESH_API_BASE_URL
        value: /api
      - key: VITE_CREDITS_ENFORCEMENT
        value: required
      - key: VITE_SHOPIFY_STORE_DOMAIN
        value: shop.maliev.com
      - key: FRONTEND_DIST_DIR
        value: /app/frontend/dist
      - key: DATABASE_URL
        fromDatabase:
          name: maliev-mesh-splitter-db
          property: connectionString
      - key: SHOPIFY_APP_PROXY_SECRET
        sync: false
      - key: SHOPIFY_WEBHOOK_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true
