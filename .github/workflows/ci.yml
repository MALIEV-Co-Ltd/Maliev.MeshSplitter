name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: mesh-splitter-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
      - name: Install frontend
        run: npm ci
        working-directory: frontend
      - name: Install backend
        run: npm ci
        working-directory: backend
      - name: Test frontend
        run: npm test
        working-directory: frontend
      - name: Test backend
        run: npm test
        working-directory: backend
      - name: Build frontend
        run: npm run build
        working-directory: frontend

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: test-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    environment:
      name: production
      url: https://shop.maliev.com/tools/mesh-splitter
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: >
          gcloud run deploy maliev-mesh-splitter
          --source .
          --project "${{ secrets.GCP_PROJECT_ID }}"
          --region europe-west1
          --quiet

      - name: Verify production health
        run: |
          curl --fail --silent --show-error https://maliev-mesh-splitter-1036965383273.europe-west1.run.app/health
